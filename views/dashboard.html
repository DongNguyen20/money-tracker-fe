<div class="view-header">
    <h2>Tổng quan</h2>
    <div class="month-selector">
        <button class="month-btn" id="prevMonth"><svg width="16" height="16" viewBox="0 0 16 16"
                fill="none">
                <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg></button>
        <span id="currentMonth"></span>
        <button class="month-btn" id="nextMonth"><svg width="16" height="16" viewBox="0 0 16 16"
                fill="none">
                <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg></button>
    </div>
</div>

<div class="summary-cards" id="summaryCards">
    <div class="summary-card card-income">
        <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 3v18m0-18l-4 4m4-4l4 4" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg></div>
        <span class="card-label">Thu nhập</span>
        <span class="card-amount" id="totalIncome">0 ₫</span>
    </div>
    <div class="summary-card card-expense">
        <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 21V3m0 18l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg></div>
        <span class="card-label">Chi tiêu</span>
        <span class="card-amount" id="totalExpense">0 ₫</span>
    </div>
    <div class="summary-card card-saving">
        <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M19 7H5a2 2 0 00-2 2v6a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2z"
                    stroke="currentColor" stroke-width="2" />
                <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="2" />
            </svg></div>
        <span class="card-label">Tiết kiệm</span>
        <span class="card-amount" id="totalSaving">0 ₫</span>
    </div>
    <div class="summary-card card-balance">
        <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" />
                <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg></div>
        <span class="card-label">Số dư</span>
        <span class="card-amount" id="totalBalance">0 ₫</span>
    </div>
</div>

<div class="dashboard-grid">
    <div class="chart-card">
        <h3>Chi tiêu hôm nay</h3>
        <div class="today-stats" id="todayStats">
            <div class="donut-container" id="donutChart"></div>
            <div class="donut-legend" id="donutLegend"></div>
        </div>
    </div>
    <div class="chart-card">
        <h3>7 ngày gần nhất</h3>
        <div class="bar-chart-container" id="barChart"></div>
    </div>
</div>

<div class="dashboard-grid">
    <div class="chart-card">
        <h3>Top chi tiêu tháng này</h3>
        <div class="top-spending" id="topSpending"></div>
    </div>
    <div class="chart-card">
        <h3>Giao dịch gần đây</h3>
        <div class="recent-transactions" id="recentTransactions"></div>
    </div>
</div>
